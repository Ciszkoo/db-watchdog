server {
  host = localhost
  port = 8080
}

db {
  host = "localhost"
  port = 54320
  user = "postgres"
  password = "password"
  schema = "db_watchdog"
  thread-pool-size = 5
}

keycloak {
  issuer = "http://localhost:8180/realms/db-watchdog"
  jwks-url = "http://localhost:8180/realms/db-watchdog/protocol/openid-connect/certs"
  audience = "db-watchdog-backend"
  authorized-party = "db-watchdog-frontend"
  clock-skew-seconds = 30
}

otp {
  ttl-seconds = 300
  random-bytes = 18
}
