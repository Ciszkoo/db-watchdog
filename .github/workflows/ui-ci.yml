name: UI CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "ui/**"
      - "Makefile"
      - ".github/workflows/ui-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "ui/**"
      - "Makefile"
      - ".github/workflows/ui-ci.yml"

jobs:
  ui-lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Run lint
        run: make ui-lint

      - name: Run typecheck
        run: make ui-typecheck

      - name: Run tests
        run: make ui-test

  ui-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Build frontend
        run: make ui-build
