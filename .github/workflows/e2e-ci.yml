name: E2E CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            e2e:
              - "ui/**"
              - "server/**"
              - "reverse-proxy/**"
              - "e2e/**"
              - "docker/**"
              - "docker-compose.yml"
              - "Makefile"
              - ".github/workflows/e2e-ci.yml"

  browser-proxy-e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
          cache-dependency-path: |
            server/build.sbt
            server/project/build.properties
            server/project/**/*.scala
            server/project/**/*.sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: reverse-proxy/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: e2e-playwright-${{ runner.os }}-${{ hashFiles('ui/pnpm-lock.yaml') }}
          restore-keys: |
            e2e-playwright-${{ runner.os }}-

      - name: Install Playwright browser
        run: pnpm --dir ui exec playwright install --with-deps chromium

      - name: Run browser + proxy E2E
        run: make e2e-test

      - name: Print E2E logs on failure
        if: failure()
        run: |
          if [ -d .e2e-tmp/logs ]; then
            find .e2e-tmp/logs -type f | sort | while read -r file; do
              echo "===== ${file} ====="
              cat "${file}"
            done
          fi

      - name: Cleanup docker environment
        if: always()
        run: docker compose down -v
