name: Scala CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      server_integration: ${{ steps.filter.outputs.server_integration }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - "server/**"
              - "Makefile"
              - ".github/workflows/scala-ci.yml"
            server_integration:
              - "server/**"
              - "docker/**"
              - "docker-compose.yml"
              - "Makefile"
              - ".github/workflows/scala-ci.yml"

  formatting-and-fix:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Setup Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
          cache-dependency-path: |
            server/build.sbt
            server/project/build.properties
            server/project/**/*.scala
            server/project/**/*.sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      # Run scalafmt check
      - name: Scalafmt check
        run: |
          cd server
          sbt scalafmtCheckAll

      # Run scalafix check
      - name: Scalafix check
        run: |
          cd server
          sbt "scalafix --check"

  server-unit-test:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
          cache-dependency-path: |
            server/build.sbt
            server/project/build.properties
            server/project/**/*.scala
            server/project/**/*.sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Run unit tests
        run: |
          cd server
          sbt test

  server-integration-test:
    needs: changes
    if: needs.changes.outputs.server_integration == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
          cache-dependency-path: |
            server/build.sbt
            server/project/build.properties
            server/project/**/*.scala
            server/project/**/*.sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Verify Docker availability
        run: docker info

      - name: Run integration tests
        run: |
          cd server
          sbt "IntegrationTest / test"

  server-coverage:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
          cache-dependency-path: |
            server/build.sbt
            server/project/build.properties
            server/project/**/*.scala
            server/project/**/*.sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Verify Docker availability
        run: docker info

      - name: Run coverage
        run: |
          cd server
          sbt coverage test "IntegrationTest / test" coverageReport

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-scoverage-report
          path: |
            server/target/scala-3.8.1/scoverage-report
            server/target/scala-3.8.1/coverage-report
